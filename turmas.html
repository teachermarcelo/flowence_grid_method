<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>▣ Turmas</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="turmas-extra.css">
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <nav>
                <ul>
                    <li><a href="alunos.html">Alunos</a></li>
                    <li class="active"><a href="turmas.html">Turmas</a></li>
                </ul>
            </nav>
        </aside>
        <main class="main-content">
            <header class="topbar">
                <div>
                    <button id="btn-new-turma" class="btn btn-primary">+ Nova Turma</button>
                </div>
            </header>
            <div class="page-header">
                <h1>▣ Turmas</h1>
            </div>
            <div class="toolbar">
                <input type="text" id="search-input" class="search-box" placeholder="Buscar por nome ou professor...">
                <div class="filter-group">
                    <select id="filter-level">
                        <option value="">Todos os Níveis</option>
                        <option value="A1">A1</option>
                        <option value="A2">A2</option>
                        <option value="B1">B1</option>
                        <option value="B2">B2</option>
                        <option value="C1">C1</option>
                    </select>
                    <select id="filter-status">
                        <option value="">Todos os Status</option>
                        <option value="ativo">Ativo</option>
                        <option value="inativo">Inativo</option>
                    </select>
                </div>
            </div>
            <div class="quick-stats">
                <div class="qstat" id="qs-total">
                    <div class="qstat-label">Total Turmas</div>
                    <div class="qstat-value">0</div>
                </div>
                <div class="qstat" id="qs-active">
                    <div class="qstat-label">Turmas Ativas</div>
                    <div class="qstat-value">0</div>
                </div>
                <div class="qstat" id="qs-shown">
                    <div class="qstat-label">Mostradas</div>
                    <div class="qstat-value">0</div>
                </div>
            </div>
            <div id="turmas-table" class="table-container">
                <!-- Linhas populadas pelo JS -->
            </div>
            <!-- Modal -->
            <div class="modal-overlay" id="modal-overlay">
                <div class="modal">
                    <div class="modal-header">
                        <h2 class="modal-title">Nova Turma</h2>
                        <button class="close-btn" id="modal-close">&times;</button>
                    </div>
                    <form id="turma-form" class="form-grid">
                        <input type="hidden" id="f-id">
                        <div class="form-group">
                            <label for="f-nome">Nome:</label>
                            <input type="text" id="f-nome" required>
                        </div>
                        <div class="form-group">
                            <label for="f-professor">Professor:</label>
                            <input type="text" id="f-professor" required>
                        </div>
                        <div class="form-group">
                            <label for="f-nivel">Nível:</label>
                            <select id="f-nivel" required>
                                <option value="">Selecione o nível</option>
                                <option value="A1">A1</option>
                                <option value="A2">A2</option>
                                <option value="B1">B1</option>
                                <option value="B2">B2</option>
                                <option value="C1">C1</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="f-horario">Horário:</label>
                            <input type="text" id="f-horario" placeholder="Ex: 14:00-15:30">
                        </div>
                        <div class="form-group">
                            <label for="f-data_inicio">Data Início:</label>
                            <input type="date" id="f-data_inicio">
                        </div>
                        <div class="form-group">
                            <label for="f-status">Status:</label>
                            <select id="f-status" required>
                                <option value="ativo">Ativo</option>
                                <option value="inativo">Inativo</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="f-observacoes">Observações:</label>
                            <textarea id="f-observacoes" rows="4"></textarea>
                        </div>
                        <div class="form-actions">
                            <button type="button" id="btn-cancel" class="btn btn-secondary">Cancelar</button>
                            <button type="button" id="btn-save" class="btn btn-primary">Salvar</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
    <script src="supabase-config.js"></script>
    <script src="turmas.js"></script>
</body>
</html>
