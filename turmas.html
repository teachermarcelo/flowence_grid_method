<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turmas - Gestão Escolar</title>
    <!-- Assume same external CSS as alunos.html -->
</head>
<body>
    <!-- Sidebar idêntica -->
    <nav id="sidebar" class="sidebar">
        <ul>
            <li><a href="dashboard.html"><span>🏠</span> Dashboard</a></li>
            <li><a href="alunos.html"><span>👨‍🎓</span> Alunos</a></li>
            <li><a href="turmas.html" class="active"><span>📚</span> Turmas</a></li>
            <li><a href="professores.html"><span>👨‍🏫</span> Professores</a></li>
            <li><a href="relatorios.html"><span>📊</span> Relatórios</a></li>
        </ul>
    </nav>

    <!-- Topbar com hamburger e + Nova Turma -->
    <header class="topbar">
        <button class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <div class="logo">Gestão Escolar</div>
        <button class="btn btn-primary" id="new-turma">+ Nova Turma</button>
    </header>

    <!-- Main content -->
    <main class="main">
        <!-- Toolbar com busca e filtros -->
        <div class="toolbar">
            <div class="search-box">
                <input type="text" id="search" placeholder="Buscar por nome ou professor...">
            </div>
            <div class="filter-group">
                <select id="filter-nivel">
                    <option value="">Todos os níveis</option>
                    <option value="basico">Básico</option>
                    <option value="intermediario">Intermediário</option>
                    <option value="avancado">Avançado</option>
                </select>
                <select id="filter-status">
                    <option value="">Todos os status</option>
                    <option value="ativo">Ativo</option>
                    <option value="inativo">Inativo</option>
                </select>
            </div>
        </div>

        <!-- Quick-stats -->
        <div class="quick-stats">
            <div class="stat-card">
                <h3 id="total-turmas">0</h3>
                <p>Total Turmas</p>
            </div>
            <div class="stat-card">
                <h3 id="turmas-ativas">0</h3>
                <p>Turmas Ativas</p>
            </div>
            <div class="stat-card">
                <h3 id="total-alunos">0</h3>
                <p>Total Alunos</p>
            </div>
        </div>

        <!-- Panel com tabela dinâmica -->
        <div class="panel">
            <table id="turmas-table">
                <thead>
                    <tr>
                        <th>Nome Turma</th>
                        <th>Professor</th>
                        <th>Nível</th>
                        <th>Horário</th>
                        <th>Status</th>
                        <th>Quantidade de Alunos</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </main>

    <!-- Modal para criar/editar turma -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <h2 id="modal-title">Nova Turma</h2>
            <form id="turma-form">
                <div class="form-group">
                    <label for="nome">Nome</label>
                    <input type="text" id="nome" required>
                </div>
                <div class="form-group">
                    <label for="professor">Professor</label>
                    <input type="text" id="professor" required>
                </div>
                <div class="form-group">
                    <label for="nivel">Nível</label>
                    <select id="nivel" required>
                        <option value="basico">Básico</option>
                        <option value="intermediario">Intermediário</option>
                        <option value="avancado">Avançado</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="horario">Horário</label>
                    <input type="text" id="horario" required>
                </div>
                <div class="form-group">
                    <label for="data-inicio">Data Início</label>
                    <input type="date" id="data-inicio" required>
                </div>
                <div class="form-group">
                    <label for="status">Status</label>
                    <select id="status">
                        <option value="ativo">Ativo</option>
                        <option value="inativo">Inativo</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="observacoes">Observações</label>
                    <textarea id="observacoes"></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" id="cancelar">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Config Supabase (substitua pelas suas credenciais, igual ao students.js)
        const supabaseUrl = 'https://your-project.supabase.co';
        const supabaseKey = 'your-anon-key';
        const { createClient } = supabase;
        const supabaseClient = createClient(supabaseUrl, supabaseKey);

        let turmas = [];
        let currentEditId = null;

        // Hamburger toggle sidebar
        document.getElementById('hamburger').addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('open');
        });

        // Nova turma
        document.getElementById('new-turma').addEventListener('click', () => openModal());

        // Filtros e busca
        const searchInput = document.getElementById('search');
        const filterNivel = document.getElementById('filter-nivel');
        const filterStatus = document.getElementById('filter-status');

        searchInput.addEventListener('input', applyFilters);
        filterNivel.addEventListener('change', applyFilters);
        filterStatus.addEventListener('change', applyFilters);

        // Modal functions
        const modalOverlay = document.getElementById('modal-overlay');
        const modalTitle = document.getElementById('modal-title');
        const turmaForm = document.getElementById('turma-form');
        const cancelarBtn = document.getElementById('cancelar');

        function openModal(turma = null) {
            if (turma) {
                currentEditId = turma.id;
                document.getElementById('nome').value = turma.nome || '';
                document.getElementById('professor').value = turma.professor || '';
                document.getElementById('nivel').value = turma.nivel || '';
                document.getElementById('horario').value = turma.horario || '';
                document.getElementById('data-inicio').value = turma.data_inicio ? turma.data_inicio.split('T')[0] : '';
                document.getElementById('status').value = turma.status || 'ativo';
                document.getElementById('observacoes').value = turma.observacoes || '';
                modalTitle.textContent = 'Editar Turma';
            } else {
                currentEditId = null;
                turmaForm.reset();
                modalTitle.textContent = 'Nova Turma';
                document.getElementById('status').value = 'ativo';
            }
            modalOverlay.classList.add('active');
        }

        function closeModal() {
            modalOverlay.classList.remove('active');
            currentEditId = null;
        }

        cancelarBtn.addEventListener('click', closeModal);
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) closeModal();
        });

        // Submit form
        turmaForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                nome: document.getElementById('nome').value,
                professor: document.getElementById('professor').value,
                nivel: document.getElementById('nivel').value,
                horario: document.getElementById('horario').value,
                data_inicio: document.getElementById('data-inicio').value,
                status: document.getElementById('status').value,
                observacoes: document.getElementById('observacoes').value
            };

            let error;
            if (currentEditId) {
                ({ error } = await supabaseClient.from('turmas').update(data).eq('id', currentEditId));
            } else {
                ({ error } = await supabaseClient.from('turmas').insert([data]));
            }
            if (error) {
                console.error('Erro:', error);
                return;
            }
            closeModal();
            loadTurmas();
        });

        // Filtrar turmas
        function getFilteredTurmas() {
            let filtered = turmas;
            const search = searchInput.value.toLowerCase();
            if (search) {
                filtered = filtered.filter(t =>
                    t.nome.toLowerCase().includes(search) ||
                    t.professor.toLowerCase().includes(search)
                );
            }
            const nivel = filterNivel.value;
            if (nivel) filtered = filtered.filter(t => t.nivel === nivel);
            const status = filterStatus.value;
            if (status) filtered = filtered.filter(t => t.status === status);
            return filtered;
        }

        function applyFilters() {
            const filtered = getFilteredTurmas();
            renderTurmas(filtered);
        }

        // Render tabela
        function renderTurmas(filteredTurmas) {
            const tbody = document.querySelector('#turmas-table tbody');
            tbody.innerHTML = '';
            filteredTurmas.forEach(turma => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${turma.nome}</td>
                    <td>${turma.professor}</td>
                    <td>${turma.nivel}</td>
                    <td>${turma.horario}</td>
                    <td><span class="badge status-${turma.status}">${turma.status}</span></td>
                    <td>${turma.quantidade_alunos || 0}</td>
                    <td>
                        <button class="btn btn-small" onclick="verAlunos('${turma.id}')">Ver Alunos</button>
                        <button class="btn btn-small btn-edit" onclick="editarTurma('${turma.id}')">Editar</button>
                        <button class="btn btn-small btn-delete" onclick="excluirTurma('${turma.id}')">Excluir</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Update stats
        function updateStats() {
            document.getElementById('total-turmas').textContent = turmas.length;
            const ativas = turmas.filter(t => t.status === 'ativo').length;
            document.getElementById('turmas-ativas').textContent = ativas;
            const totalAlunos = turmas.reduce((sum, t) => sum + (t.quantidade_alunos || 0), 0);
            document.getElementById('total-alunos').textContent = totalAlunos;
        }

        // Load turmas com contagem dinâmica de alunos
        async function loadTurmas() {
            const { data: turmasData, error: turmasError } = await supabaseClient.from('turmas').select('*');
            if (turmasError) {
                console.error('Erro ao carregar turmas:', turmasError);
                return;
            }

            const { data: alunosData, error: alunosError } = await supabaseClient.from('alunos').select('turma_id');
            if (alunosError) {
                console.error('Erro ao carregar alunos:', alunosError);
            }

            const counts = {};
            if (alunosData) {
                alunosData.forEach(aluno => {
                    counts[aluno.turma_id] = (counts[aluno.turma_id] || 0) + 1;
                });
            }

            turmas = turmasData.map(turma => ({
                ...turma,
                quantidade_alunos: counts[turma.id] || 0
            }));

            updateStats();
            applyFilters();
        }

        // Ações globais
        window.excluirTurma = async (id) => {
            if (confirm('Tem certeza que deseja excluir esta turma?')) {
                const { error } = await supabaseClient.from('turmas').delete().eq('id', id);
                if (!error) loadTurmas();
            }
        };

        window.editarTurma = (id) => {
            const turma = turmas.find(t => t.id === id);
            if (turma) openModal(turma);
        };

        window.verAlunos = (id) => {
            window.location.href = `alunos.html?turma_id=${id}`;
        };

        // Inicializar
        loadTurmas();
    </script>
</body>
</html>
