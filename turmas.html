<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>▣ Turmas</title>
    <!-- Estilos CSS externos assumidos como no alunos.html -->
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <nav>
                <ul>
                    <li><a href="alunos.html">Alunos</a></li>
                    <li class="active"><a href="turmas.html">Turmas</a></li>
                </ul>
            </nav>
        </aside>
        <main class="main-content">
            <header class="topbar">
                <div>
                    <button id="new-turma-btn" class="btn btn-primary">+ Nova Turma</button>
                </div>
            </header>
            <div class="page-header">
                <h1>▣ Turmas</h1>
            </div>
            <div class="toolbar">
                <input type="text" id="search-turmas" class="search-box" placeholder="Buscar por nome ou professor...">
                <div class="filter-group">
                    <select id="filter-nivel">
                        <option value="">Todos os Níveis</option>
                        <option value="Iniciante">Iniciante</option>
                        <option value="Intermediário">Intermediário</option>
                        <option value="Avançado">Avançado</option>
                    </select>
                    <select id="filter-status">
                        <option value="">Todos os Status</option>
                        <option value="Ativo">Ativo</option>
                        <option value="Inativo">Inativo</option>
                    </select>
                </div>
            </div>
            <div class="quick-stats">
                <div class="panel">
                    <h3>Total Turmas</h3>
                    <span id="total-turmas">0</span>
                </div>
                <div class="panel">
                    <h3>Turmas Ativas</h3>
                    <span id="turmas-ativas">0</span>
                </div>
                <div class="panel">
                    <h3>Total Alunos</h3>
                    <span id="total-alunos">0</span>
                </div>
            </div>
            <table class="table">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Professor</th>
                        <th>Nível</th>
                        <th>Horário</th>
                        <th>Data Início</th>
                        <th>Status</th>
                        <th>Total Alunos</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="turmas-table-body">
                    <!-- Linhas populadas pelo JS -->
                </tbody>
            </table>
            <!-- Modal -->
            <div class="modal-overlay" id="turma-modal">
                <div class="modal">
                    <div class="modal-header">
                        <h2 id="modal-title">Nova Turma</h2>
                        <button class="close-btn" id="close-modal">&times;</button>
                    </div>
                    <form id="turma-form" class="form-grid">
                        <input type="hidden" id="turma-id">
                        <div>
                            <label for="nome">Nome:</label>
                            <input type="text" id="nome" required>
                        </div>
                        <div>
                            <label for="professor">Professor:</label>
                            <input type="text" id="professor" required>
                        </div>
                        <div>
                            <label for="nivel">Nível:</label>
                            <select id="nivel" required>
                                <option value="">Selecione o nível</option>
                                <option value="Iniciante">Iniciante</option>
                                <option value="Intermediário">Intermediário</option>
                                <option value="Avançado">Avançado</option>
                            </select>
                        </div>
                        <div>
                            <label for="horario">Horário:</label>
                            <input type="text" id="horario" required>
                        </div>
                        <div>
                            <label for="data_inicio">Data Início:</label>
                            <input type="date" id="data_inicio" required>
                        </div>
                        <div>
                            <label for="status">Status:</label>
                            <select id="status" required>
                                <option value="Ativo">Ativo</option>
                                <option value="Inativo">Inativo</option>
                            </select>
                        </div>
                        <div>
                            <label for="observacoes">Observações:</label>
                            <textarea id="observacoes" rows="4"></textarea>
                        </div>
                        <div class="form-actions">
                            <button type="button" id="cancel-btn">Cancelar</button>
                            <button type="submit" class="btn btn-primary">Salvar</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
    <script src="supabase-config.js"></script>
    <script src="turmas.js"></script>
</body>
</html>
