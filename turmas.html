<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turmas - Flowence</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #8B5CF6;
            --primary-dark: #7C3AED;
            --primary-light: #A855F7;
            --bg: #F8FAFC;
            --surface: #FFFFFF;
            --text: #0F172A;
            --text-muted: #64748B;
            --border: #E2E8F0;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 10px 10px -5px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 25px 50px -12px rgb(0 0 0 / 0.25);
        }
        * {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            width: 16rem;
            background: var(--surface);
            box-shadow: var(--shadow-lg);
            z-index: 50;
            transform: translateX(0);
            transition: transform 0.3s ease-in-out;
        }
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }
            .sidebar.open {
                transform: translateX(0);
            }
        }
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary);
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        header {
            position: fixed;
            top: 0;
            left: 16rem;
            right: 0;
            height: 4rem;
            background: var(--surface);
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
            z-index: 40;
        }
        @media (max-width: 768px) {
            header {
                left: 0;
            }
        }
        .hamburger {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-muted);
            padding: 0.5rem;
            border-radius: 0.5rem;
            transition: background 0.2s;
        }
        .hamburger:hover {
            background: var(--border);
        }
        h1 {
            margin: 0;
            font-size: 1.5rem;
            color: var(--text);
        }
        main {
            margin-left: 16rem;
            margin-top: 4rem;
            padding: 2rem;
        }
        @media (max-width: 768px) {
            main {
                margin-left: 0;
            }
        }
        .filters {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .filters input,
        .filters select {
            padding: 0.75rem 1rem;
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            font-size: 1rem;
            transition: all 0.2s;
            min-width: 200px;
        }
        .filters input:focus,
        .filters select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgb(139 92 246 / 0.1);
        }
        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: var(--shadow);
        }
        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: var(--shadow-lg);
        }
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }
        .card {
            background: var(--surface);
            padding: 1.5rem;
            border-radius: 1rem;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            border: 1px solid var(--border);
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-xl);
        }
        .card h3 {
            margin: 0 0 1rem;
            font-size: 1.25rem;
            color: var(--text);
        }
        .card p {
            margin: 0.5rem 0;
            color: var(--text-muted);
        }
        .card-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }
        .action-btn {
            background: #F1F5F9;
            border: none;
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            transition: all 0.2s;
        }
        .action-btn:hover {
            background: var(--primary-light);
            color: white;
            transform: scale(1.1);
        }
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        .modal.open {
            opacity: 1;
            visibility: visible;
        }
        .modal-content {
            background: var(--surface);
            padding: 2rem;
            border-radius: 1.25rem;
            max-width: 28rem;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow-xl);
            transform: translateY(-20px) scale(0.95);
            animation: slideIn 0.3s ease-out forwards;
        }
        @keyframes slideIn {
            to {
                transform: translateY(0) scale(1);
            }
        }
        .modal form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .modal input,
        .modal select {
            padding: 0.75rem 1rem;
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            font-size: 1rem;
        }
        .modal input:focus,
        .modal select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgb(139 92 246 / 0.1);
        }
        .modal-buttons {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 1.5rem;
        }
        .btn-secondary {
            background: #F1F5F9;
            color: var(--text-muted);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover {
            background: #E2E8F0;
        }
        #listaAlunos {
            max-height: 300px;
            overflow-y: auto;
            margin: 1rem 0;
        }
        #listaAlunos li {
            padding: 0.75rem;
            border-bottom: 1px solid var(--border);
        }
        #listaAlunos li:last-child {
            border-bottom: none;
        }
        .empty {
            text-align: center;
            color: var(--text-muted);
            font-style: italic;
            padding: 2rem;
        }
    </style>
</head>
<body>
    <aside class="sidebar" id="sidebar">
        <div class="logo">🌊 Flowence</div>
    </aside>
    <header>
        <button class="hamburger" id="hamburger">☰</button>
        <h1>Gerenciar Turmas</h1>
    </header>
    <main>
        <div class="filters">
            <input type="text" id="search" placeholder="Buscar por nome da turma...">
            <select id="nivelFilter">
                <option value="Todos">Todos os Níveis</option>
                <option value="Fundamental I">Fundamental I</option>
                <option value="Fundamental II">Fundamental II</option>
                <option value="Médio">Médio</option>
                <option value="Superior">Superior</option>
            </select>
        </div>
        <button class="btn-primary" id="novaTurma">+ Nova Turma</button>
        <div class="cards" id="cardsContainer">
            <!-- Cards serão renderizados aqui -->
        </div>
    </main>

    <!-- Modal Criar/Editar Turma -->
    <div class="modal" id="modalTurma">
        <div class="modal-content">
            <h2 id="modalTitle">Nova Turma</h2>
            <form id="formTurma">
                <input id="nome" placeholder="Nome da turma" required>
                <input id="professor" placeholder="Nome do professor" required>
                <select id="nivelSelect" required>
                    <option value="">Selecione o nível</option>
                    <option value="Fundamental I">Fundamental I</option>
                    <option value="Fundamental II">Fundamental II</option>
                    <option value="Médio">Médio</option>
                    <option value="Superior">Superior</option>
                </select>
                <input id="horario" placeholder="Horário (ex: Seg-Sex 14h-16h)" required>
                <div class="modal-buttons">
                    <button type="button" class="btn-secondary" id="cancelBtn">Cancelar</button>
                    <button type="submit" class="btn-primary">Salvar Turma</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal Ver Alunos -->
    <div class="modal" id="modalAlunos">
        <div class="modal-content">
            <h2 id="alunosTitle">Alunos da Turma</h2>
            <ul id="listaAlunos"></ul>
            <div class="modal-buttons">
                <button class="btn-primary" id="fecharAlunos">Fechar</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Substitua pelas suas credenciais reais do Supabase
            const supabaseUrl = 'https://seu-projeto.supabase.co';
            const supabaseAnonKey = 'sua-chave-anon-publica';
            const { createClient } = supabase;
            const supabase = createClient(supabaseUrl, supabaseAnonKey);

            const hamburger = document.getElementById('hamburger');
            const sidebar = document.getElementById('sidebar');
            const novaTurma = document.getElementById('novaTurma');
            const search = document.getElementById('search');
            const nivelFilter = document.getElementById('nivelFilter');
            const cardsContainer = document.getElementById('cardsContainer');
            const modalTurma = document.getElementById('modalTurma');
            const formTurma = document.getElementById('formTurma');
            const cancelBtn = document.getElementById('cancelBtn');
            const modalAlunos = document.getElementById('modalAlunos');
            const fecharAlunos = document.getElementById('fecharAlunos');
            const listaAlunos = document.getElementById('listaAlunos');

            let editingId = null;
            let allTurmas = [];
            let alunosByTurma = {};
            let displayTurmas = [];

            hamburger.addEventListener('click', () => sidebar.classList.toggle('open'));
            novaTurma.addEventListener('click', () => openModalTurma(null));
            search.addEventListener('input', debounce(filterTurmas, 300));
            nivelFilter.addEventListener('change', filterTurmas);
            cancelBtn.addEventListener('click', closeModalTurma);
            fecharAlunos.addEventListener('click', () => modalAlunos.classList.remove('open'));
            modalTurma.addEventListener('click', (e) => { if (e.target === modalTurma) closeModalTurma(); });
            modalAlunos.addEventListener('click', (e) => { if (e.target === modalAlunos) modalAlunos.classList.remove('open'); });
            formTurma.addEventListener('submit', handleSubmit);

            await loadData();

            async function loadData() {
                try {
                    const { data: turmasData, error: turmasError } = await supabase
                        .from('turmas')
                        .select('*')
                        .order('nome', { ascending: true });
                    if (turmasError) throw turmasError;

                    allTurmas = turmasData || [];

                    const { data: alunosData, error: alunosError } = await supabase
                        .from('alunos')
                        .select('id, nome, turma_id')
                        .order('nome');
                    if (alunosError) throw alunosError;

                    alunosByTurma = {};
                    alunosData?.forEach((aluno) => {
                        if (!alunosByTurma[aluno.turma_id]) {
                            alunosByTurma[aluno.turma_id] = [];
                        }
                        alunosByTurma[aluno.turma_id].push(aluno.nome);
                    });

                    allTurmas.forEach((turma) => {
                        turma.alunos_count = alunosByTurma[turma.id]?.length || 0;
                    });

                    displayTurmas = [...allTurmas];
                    renderCards();
                } catch (error) {
                    console.error('Erro ao carregar dados:', error);
                    cardsContainer.innerHTML = '<div class="empty">Erro ao carregar turmas. Verifique as credenciais do Supabase e as tabelas.</div>';
                }
            }

            function debounce(fn, delay) {
                let timeout;
                return (...args) => {
                    clearTimeout(timeout);
                    timeout = setTimeout(() => fn(...args), delay);
                };
            }

            function filterTurmas() {
                const searchTerm = search.value.toLowerCase();
                const selectedNivel = nivelFilter.value;
                displayTurmas = allTurmas.filter((turma) =>
                    turma.nome.toLowerCase().includes(searchTerm) &&
                    (selectedNivel === 'Todos' || turma.nivel === selectedNivel)
                );
                renderCards();
            }

            function renderCards() {
                if (displayTurmas.length === 0) {
                    cardsContainer.innerHTML = '<div class="empty">Nenhuma turma encontrada.</div>';
                    return;
                }
                cardsContainer.innerHTML = displayTurmas.map((turma) => `
                    <div class="card">
                        <h3>${escapeHtml(turma.nome)}</h3>
                        <p><strong>Professor:</strong> ${escapeHtml(turma.professor)}</p>
                        <p><strong>Nível:</strong> ${escapeHtml(turma.nivel)}</p>
                        <p><strong>Horário:</strong> ${escapeHtml(turma.horario)}</p>
                        <p><strong>Alunos:</strong> ${turma.alunos_count}</p>
                        <div class="card-actions">
                            <button class="action-btn" title="Ver alunos" data-id="${turma.id}">👁️</button>
                            <button class="action-btn" title="Editar" data-id="${turma.id}" style="background:#10B981;color:white;">✏️</button>
                            <button class="action-btn" title="Deletar" data-id="${turma.id}" style="background:#EF4444;color:white;">🗑️</button>
                        </div>
                    </div>
                `).join('');

                // Adicionar event listeners
                cardsContainer.querySelectorAll('[title="Ver alunos"]').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const turmaId = parseInt(e.target.dataset.id);
                        viewAlunos(turmaId);
                    });
                });
                cardsContainer.querySelectorAll('[title="Editar"]').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const turmaId = parseInt(e.target.dataset.id);
                        const turma = allTurmas.find(t => t.id === turmaId);
                        openModalTurma(turma);
                    });
                });
                cardsContainer.querySelectorAll('[title="Deletar"]').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        if (confirm('Tem certeza que deseja deletar esta turma?')) {
                            await deleteTurma(parseInt(e.target.dataset.id));
                        }
                    });
                });
            }

            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            function openModalTurma(turma) {
                editingId = turma ? turma.id : null;
                document.getElementById('modalTitle').textContent = turma ? 'Editar Turma' : 'Nova Turma';
                document.getElementById('nome').value = turma?.nome || '';
                document.getElementById('professor').value = turma?.professor || '';
                document.getElementById('nivelSelect').value = turma?.nivel || '';
                document.getElementById('horario').value = turma?.horario || '';
                modalTurma.classList.add('open');
            }

            function closeModalTurma() {
                modalTurma.classList.remove('open');
                formTurma.reset();
                editingId = null;
            }

            async function handleSubmit(e) {
                e.preventDefault();
                const nome = document.getElementById('nome').value.trim();
                const professor = document.getElementById('professor').value.trim();
                const nivel = document.getElementById('nivelSelect').value;
                const horario = document.getElementById('horario').value.trim();
                if (!nome || !professor || !nivel || !horario) {
                    alert('Por favor, preencha todos os campos.');
                    return;
                }
                const turmaData = { nome, professor, nivel, horario };
                try {
                    let error;
                    if (editingId) {
                        const { error: updateError } = await supabase
                            .from('turmas')
                            .update(turmaData)
                            .eq('id', editingId);
                        error = updateError;
                    } else {
                        const { error: insertError } = await supabase.from('turmas').insert(turmaData);
                        error = insertError;
                    }
                    if (error) throw error;
                    closeModalTurma();
                    await loadData();
                } catch (err) {
                    console.error('Erro ao salvar:', err);
                    alert('Erro ao salvar turma: ' + err.message);
                }
            }

            async function deleteTurma(id) {
                try {
                    const { error } = await supabase.from('turmas').delete().eq('id', id);
                    if (error) throw error;
                    await loadData();
                } catch (err) {
                    console.error('Erro ao deletar:', err);
                    alert('Erro ao deletar turma.');
                }
            }

            function viewAlunos(turmaId) {
                const alunos = alunosByTurma[turmaId] || [];
                const turma = allTurmas.find(t => t.id === turmaId);
                document.getElementById('alunosTitle').textContent = `Alunos da turma: ${turma ? escapeHtml(turma.nome) : 'Desconhecida'}`;
                listaAlunos.innerHTML = alunos.length > 0
                    ? alunos.map(nome => `<li>${escapeHtml(nome)}</li>`).join('')
                    : '<li>Nenhum aluno matriculado.</li>';
                modalAlunos.classList.add('open');
            }
        });
    </script>
</body>
</html>
